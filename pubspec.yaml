name: snackup
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
    
  # --- Firebase ---
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  firebase_messaging: ^16.1.1
  
  # --- UI y Diseño ---
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  fl_chart: ^0.66.0
  flutter_staggered_grid_view: ^0.7.0
  another_stepper: ^1.2.2
  audioplayers: ^6.0.0
  
  # --- Hardware, QR y Permisos ---
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.3
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  
  # --- Inteligencia Artificial y Variables de Entorno ---
  google_generative_ai: ^0.4.6
  flutter_dotenv: ^6.0.0
  
  # --- Assets: Iconos y Splash Screen ---
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# ==========================================
# CONFIGURACIÓN DEL ICONO DE LA APP
# ==========================================
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

# ==========================================
# CONFIGURACIÓN DEL SPLASH SCREEN
# ==========================================
flutter_native_splash:
  color: "#4a54df"
  image: "assets/logo.png"
  fullscreen: true
  android_12: 
    image: "assets/logo.png"
    color: "#ffffff"

# ==========================================
# CONFIGURACIÓN DE FLUTTER (Assets y Fuentes)
# ==========================================
flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - .env

  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato/Lato-Bold.ttf
          weight: 700
          
    - family: Quicksand
      fonts:
        - asset: assets/fonts/Quicksand/static/Quicksand-Light.ttf
          weight: 300
        - asset: assets/fonts/Quicksand/static/Quicksand-Regular.ttf
          weight: 400
        - asset: assets/fonts/Quicksand/static/Quicksand-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Quicksand/static/Quicksand-Bold.ttf
          weight: 700